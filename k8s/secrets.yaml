# IMPORTANT: This file contains placeholder values
# Replace <base64-encoded-values> with actual base64-encoded secrets before applying
# Use: echo -n "your-secret-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: fantasy-characters-secrets
  namespace: fantasy-characters
type: Opaque
data:
  # Replace with actual base64-encoded database URL
  # Example for PostgreSQL: postgresql://username:password@postgres-service:5432/fantasy_characters_db
  database-url: <base64-encoded-database-url>

  # Replace with actual base64-encoded JWT secret (should be a long random string)
  jwt-secret: <base64-encoded-jwt-secret>

  # Replace with actual base64-encoded refresh token secret (should be different from jwt-secret)
  jwt-refresh-secret: <base64-encoded-refresh-secret>

---
# Example of how to create secrets (run these commands instead of applying this file):
# kubectl create secret generic fantasy-characters-secrets \
#   --from-literal=database-url="postgresql://username:password@postgres-service:5432/fantasy_characters_db" \
#   --from-literal=jwt-secret="your-very-long-and-random-jwt-secret-here" \
#   --from-literal=jwt-refresh-secret="your-very-long-and-random-refresh-secret-here" \
#   --namespace=fantasy-characters
