apiVersion: apps/v1
kind: Deployment
metadata:
  name: fantasy-characters-api
  namespace: fantasy-characters
  labels:
    app: fantasy-characters-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fantasy-characters-api
  template:
    metadata:
      labels:
        app: fantasy-characters-api
        version: v1
    spec:
      containers:
        - name: api
          image: fantasy-characters-api:latest # Replace with your actual image
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: fantasy-characters-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fantasy-characters-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fantasy-characters-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: fantasy-characters-secrets
                  key: jwt-refresh-secret

          # Kubernetes health checks using the 4 different endpoints
          livenessProbe:
            httpGet:
              path: /api/live
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /api/healthz
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
            successThreshold: 1

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false # Set to true if app doesn't need to write to filesystem
            capabilities:
              drop:
                - ALL

          # Volume mounts if needed (for file uploads, temp files, etc.)
          # volumeMounts:
          # - name: temp-volume
          #   mountPath: /tmp

      # Volumes if needed
      # volumes:
      # - name: temp-volume
      #   emptyDir: {}

      # Security context for the pod
      securityContext:
        fsGroup: 1000

      # Resource optimization
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
