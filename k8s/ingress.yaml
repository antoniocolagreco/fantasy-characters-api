apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fantasy-characters-api-ingress
  namespace: fantasy-characters
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://fantasy-characters.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options DENY;
      add_header X-Content-Type-Options nosniff;
      add_header X-XSS-Protection "1; mode=block";
      add_header Referrer-Policy strict-origin-when-cross-origin;

    # SSL/TLS configuration (requires cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Health check path for load balancer
    nginx.ingress.kubernetes.io/health-check-path: "/api/healthz"

spec:
  tls:
    - hosts:
        - api.fantasy-characters.com
      secretName: fantasy-characters-tls

  rules:
    - host: api.fantasy-characters.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fantasy-characters-api-service
                port:
                  number: 80

          # Specific health check endpoint for monitoring
          - path: /health
            pathType: Exact
            backend:
              service:
                name: fantasy-characters-api-health
                port:
                  number: 3000

---
# Optional: Separate ingress for staging environment
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fantasy-characters-api-staging-ingress
  namespace: fantasy-characters
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  tls:
    - hosts:
        - staging-api.fantasy-characters.com
      secretName: fantasy-characters-staging-tls
  rules:
    - host: staging-api.fantasy-characters.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fantasy-characters-api-service
                port:
                  number: 80
